<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* Auf PCs die doppelte Seitenleiste abschalten und Text zentrieren */
  @media (min-width: 50rem) {
    .side-bar { display: none !important; }
    .main { margin-left: 0 !important; }
    .main-content { max-width: 52rem !important; margin: 0 auto !important; }
  }

  /* --- MOBIL-OPTIMIERUNG --- */
  
  /* Das originale, fehlerhafte Theme-Menü restlos ausblenden */
  .site-nav-trigger, .main-nav-trigger, .site-header button { 
    display: none !important; 
  }

  /* Sicherstellen, dass die Kopfzeile die richtige Positionierung erlaubt */
  .site-header {
    position: relative !important;
  }

  /* Unseren neuen, unkaputtbaren Übersicht-Button stylen */
  .custom-mobile-nav {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: #7253ed !important; /* Das lila der Just-the-Docs Links */
    font-weight: bold;
    text-decoration: none;
    font-size: 0.9rem;
    padding: 6px 10px;
    border: 1px solid #e9ebec;
    border-radius: 4px;
    background-color: #f5f6f7;
  }

  /* Auf dem Desktop wird der mobile Button ausgeblendet */
  @media (min-width: 50rem) {
    .custom-mobile-nav { display: none !important; }
  }
</style>

<script>
  // Wir injizieren den echten Link direkt nach dem Laden in die mobile Kopfzeile
  document.addEventListener("DOMContentLoaded", function() {
    var header = document.querySelector(".site-header");
    if (header) {
      var navLink = document.createElement("a");
      navLink.href = "/";
      navLink.className = "custom-mobile-nav";
      navLink.innerHTML = "Übersicht ☰";
      header.appendChild(navLink);
    }
  });
</script>
