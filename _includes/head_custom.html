<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* Auf PCs und Tablets die doppelte Seitenleiste abschalten und Text zentrieren */
  @media (min-width: 50rem) {
    .side-bar { display: none !important; }
    .main { margin-left: 0 !important; }
    .main-content { max-width: 52rem !important; margin: 0 auto !important; }
  }

  /* Styling für das unsichtbare Klick-Schild auf dem Handy */
  .mobile-home-overlay {
    position: fixed;
    top: 0;
    right: 0;
    width: 75px;
    height: 60px;
    z-index: 999999;
    background: transparent;
    display: block;
  }

  /* Auf dem PC brauchen wir das Schild nicht */
  @media (min-width: 50rem) {
    .mobile-home-overlay { display: none !important; }
  }
</style>

<script>
  // Wir injizieren den unsichtbaren Link direkt nach dem Laden in die Seite
  document.addEventListener("DOMContentLoaded", function() {
    var overlay = document.createElement("a");
    overlay.href = "/";
    overlay.className = "mobile-home-overlay";
    document.body.appendChild(overlay);
  });
</script>
