<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* Auf PCs die doppelte Seitenleiste abschalten und Text zentrieren */
  @media (min-width: 50rem) {
    .side-bar { display: none !important; }
    .main { margin-left: 0 !important; }
    .main-content { max-width: 52rem !important; margin: 0 auto !important; }
  }

  /* --- MOBIL-OPTIMIERUNG (Isolierte Variante) --- */
  
  /* Unseren eigenen, vom Theme isolierten Burger-Link exakt stylen */
  .custom-isolated-burger {
    display: inline-flex !important;
    align-items: center !important;
    justify-content: center !important;
    color: #7253ed !important; /* Das lila Logo-Design des Themes */
    background: transparent !important;
    border: none !important;
    padding: 12px !important;
    cursor: pointer !important;
    text-decoration: none !important;
  }

  /* Sicherstellen, dass das originale SVG-Icon die richtige Größe behält */
  .custom-isolated-burger svg {
    width: 24px !important;
    height: 24px !important;
    fill: currentColor !important;
  }

  /* Auf dem Desktop ausblenden */
  @media (min-width: 50rem) {
    .custom-isolated-burger { display: none !important; }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Wir greifen uns den echten Menü-Button des Themes über seine ID
    var nativeBtn = document.getElementById("menu-button");
    
    if (nativeBtn) {
      // Wir erstellen einen absolut autarken Link zur Startseite
      var homeLink = document.createElement("a");
      homeLink.href = "/";
      homeLink.className = "custom-isolated-burger"; // Keine Theme-Klassen!
      homeLink.innerHTML = nativeBtn.innerHTML; // Kopiert das originale lila ☰ SVG-Icon
      
      // Kappe jede Event-Übertragung nach oben
      homeLink.addEventListener("click", function(e) {
        e.stopPropagation();
      }, { capture: true });

      // Ersetze den alten Button im Header
      nativeBtn.parentNode.replaceChild(homeLink, nativeBtn);
    }
  });
</script>
