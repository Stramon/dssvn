<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* Auf PCs die doppelte Seitenleiste abschalten und Text zentrieren */
  @media (min-width: 50rem) {
    .side-bar { display: none !important; }
    .main { margin-left: 0 !important; }
    .main-content { max-width: 52rem !important; margin: 0 auto !important; }
  }

  /* --- MOBIL-OPTIMIERUNG --- */
  
  /* Unseren modifizierten Home-Burger-Button farblich anpassen */
  #custom-menu-button {
    display: flex !important;
    align-items: center;
    justify-content: center;
    color: #7253ed !important; /* Das lila Logo-Design des Themes */
    padding: 0.5rem;
  }

  /* Auf dem PC blenden wir den Button aus */
  @media (min-width: 50rem) {
    #custom-menu-button { display: none !important; }
  }
</style>

<script>
  document.addEventListener("DOMContentLoaded", function() {
    // Wir greifen uns den echten, nativen Menü-Button des Themes
    var nativeBtn = document.getElementById("menu-button");
    
    if (nativeBtn) {
      // Wir bauen einen echten Link, der den Platz des Buttons einnimmt
      var homeLink = document.createElement("a");
      homeLink.href = "/";
      homeLink.id = "custom-menu-button";
      homeLink.className = nativeBtn.className; // Übernimmt die originale CSS-Positionierung im Header
      homeLink.innerHTML = nativeBtn.innerHTML; // Kopiert das originale Drei-Striche-Icon (SVG)
      
      // Verhindert, dass Event-Handler des Themes auf den Klick anspringen
      homeLink.addEventListener("click", function(e) {
        e.stopPropagation();
      });

      // Tausch den alten Button im Header knallhart gegen unseren Link aus
      nativeBtn.parentNode.replaceChild(homeLink, nativeBtn);
    }
  });
</script>
