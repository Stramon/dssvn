<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* Auf PCs die doppelte Seitenleiste abschalten und Text zentrieren */
  @media (min-width: 50rem) {
    .side-bar { display: none !important; }
    .main { margin-left: 0 !important; }
    .main-content { max-width: 52rem !important; margin: 0 auto !important; }
  }

  /* --- MOBIL-OPTIMIERUNG (Bypass-Methode) --- */
  
  /* Originales Theme-Menü und dessen Trigger radikal ausblenden */
  .site-nav-trigger, .main-nav-trigger, .site-header button, .nav-trigger, label[for="nav-trigger"] { 
    display: none !important; 
  }

  /* Unser unkaputtbares Burger-Symbol: Festgetackert oben rechts im Viewport */
  .custom-burger-fixed {
    position: fixed !important;
    top: 0 !important;
    right: 0 !important;
    width: 55px !important;
    height: 55px !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    color: #7253ed !important; /* Das lila Logo-Design des Themes */
    font-size: 1.8rem !important;
    text-decoration: none !important;
    z-index: 999999 !important; /* Überlagert absolut alles */
    background: transparent !important;
  }

  /* Auf dem PC blenden wir das mobile Zeichen komplett aus */
  @media (min-width: 50rem) {
    .custom-burger-fixed { display: none !important; }
  }
</style>

<script>
  // Wir hängen das Symbol direkt an den Body an, das klappt immer
  document.addEventListener("DOMContentLoaded", function() {
    if (!document.querySelector(".custom-burger-fixed")) {
      var burgerLink = document.createElement("a");
      burgerLink.href = "/";
      burgerLink.className = "custom-burger-fixed";
      burgerLink.innerHTML = "☰";
      document.body.appendChild(burgerLink);
    }
  });
</script>
