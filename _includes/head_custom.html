<style>
  /* Den englischen Footer ausblenden */
  .site-footer { display: none !important; }

  /* --- GLOBALES LAYOUT & PC-OPTIMIERUNG --- */
  
  /* Auf PCs die vertikale Seitenleiste zur flachen Kopfzeile machen */
  @media (min-width: 50rem) {
    .side-bar {
      position: static !important;
      display: block !important;
      width: 100% !important;
      height: auto !important;
      padding: 0 !important;
      background-color: #f5f6fa !important; /* Lila/grauer Hintergrund */
      border-right: none !important;
      border-bottom: 1px solid #e9ebf2 !important;
    }

    /* Alles andere in der PC-Seitenleiste (Navigationsbaum) ausblenden */
    .side-bar > *:not(.site-header) {
      display: none !important;
    }

    /* Hauptinhalt zentrieren */
    .main {
      margin-left: 0 !important;
    }
    .main-content {
      max-width: 52rem !important;
      margin: 0 auto !important;
      padding: 2rem 1rem !important;
    }
  }

  /* --- GLOBALE KOPFZEILEN-STYLINGS (Für PC & Mobile) --- */
  
  /* 1. Die Kopfzeile als Flexbox-Container definieren (Titel links, Burger rechts) */
  .site-header { 
    display: flex !important; 
    position: relative !important; 
    justify-content: space-between !important; /* Erzwingt Aufteilung (links/rechts) */
    align-items: center !important;
    padding: 0.75rem 1rem !important;
    width: 100% !important;
  }

  /* 2. Den "Just the Docs" Navigationstitel und Text-Leaks im Keim ersticken */
  .site-nav, .site-header .site-button { 
    display: none !important; 
  }

  /* 3. Das Burger-Icon am PC und Handy sichtbar machen (wird per pointer-events zum passiven Bild) */
  #menu-button, .site-nav-trigger { 
    display: block !important;
    order: 2 !important; /* Zwingt das Icon ans Ende der Flexbox (rechts) */
    pointer-events: none !important; 
    margin-right: 0 !important;
  }

  /* 4. Den Titel-Link als unsichtbare Klickfläche über die GESAMTE Kopfzeile legen */
  .site-title {
    order: 1 !important; /* Zwingt den Titel an den Anfang der Flexbox (links) */
  }
  .site-title::after {
    content: "" !important;
    position: absolute !important;
    top: 0 !important;
    left: 0 !important;
    width: 100% !important;
    height: 100% !important;
    z-index: 99999 !important;
  }

  /* Blaues Aufblitzen beim Tippen auf Handys verhindern */
  .site-title, .site-title::after, #menu-button, .site-header {
    -webkit-tap-highlight-color: transparent !important;
  }
</style>

{% if page.url == "/" or page.url == "/index.html" %}
<style>
  #menu-button, .site-nav-trigger {
    display: none !important;
  }
</style>
{% endif %}
